name: Daily Email Campaign

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 czasu polskiego (UTC+2)
  workflow_dispatch:        # możliwość ręcznego uruchomienia z GitHub UI

jobs:
  campaign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx requests beautifulsoup4 python-dotenv

      - name: Run daily campaign
        env:
          BREVO_API_KEY:        ${{ secrets.BREVO_API_KEY }}
          GOOGLE_PLACES_KEY:    ${{ secrets.GOOGLE_PLACES_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL:             https://www.tworczasiec.pl
        run: python -X utf8 leads/daily_run.py

      - name: Commit updated leads & sent log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads/leads.csv leads/sent_log.json
          git diff --staged --quiet || git commit -m "leads: daily update $(date -u +%Y-%m-%d)"
          git push
